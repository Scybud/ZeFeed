<link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">

<!-- Primary Meta Tags -->
<meta name="title" content="Explore Tech News | ZeFeed">
<meta name="description" content="Stay updated with fast, clean tech summaries, images, and insights covering AI, startups, gadgets, cybersecurity, and more.">
<meta name="keywords" content="tech news, explore tech, AI news, gadget updates, startup news, cybersecurity news, technology summaries, ZeFeed explore">
<meta name="author" content="ZeFeed">

<!-- Canonical URL -->
<link rel="canonical" href="https://zefeed.vercel.app/explore">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://zefeed.vercel.app/explore">
<meta property="og:title" content="Explore Tech News | ZeFeed">
<meta property="og:description" content="Discover the latest tech stories with clean summaries and visuals from across the web.">
<meta property="og:image" content="https://zefeed.vercel.app/assets/images/zefeed-logo.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="https://zefeed.vercel.app/explore">
<meta name="twitter:title" content="Explore Tech News | ZeFeed">
<meta name="twitter:description" content="Explore trending tech news with summaries, images, and fast insights.">
<meta name="twitter:image" content="https://zefeed.vercel.app/assets/images/zefeed-logo.png">

<!-- Robots -->
<meta name="robots" content="index, follow">
<meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">

<!-- Theme Color -->
<meta name="theme-color" content="#000000">

<!-- Structured Data: Collection Page -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "Explore Tech News | ZeFeed",
  "url": "https://zefeed.vercel.app/explore",
  "description": "A curated feed of tech news summaries with images, titles, and descriptions from trusted sources.",
  "image": "https://zefeed.vercel.app/assets/images/zefeed-logo.png",
  "publisher": {
    "@type": "Organization",
    "name": "ZeFeed",
    "url": "https://zefeed.vercel.app",
    "logo": {
      "@type": "ImageObject",
      "url": "https://zefeed.vercel.app/assets/images/zefeed-logo.png"
    }
  }
}
</script>
